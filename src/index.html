<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Building Safety Remedial Action Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <h1>Remedial actions</h1>
    <p class="subtitle">Actions raised from fire risk assessments, tracked to completion.</p>
  </header>

  <main>
    <section class="add-action-panel" aria-label="Add action">
      <h2>Add a remedial action</h2>
      <form id="add-action-form" novalidate>
        <div class="form-field">
          <label for="new-building">Building / block reference</label>
          <input type="text" id="new-building" name="buildingRef" />
          <p class="field-error" id="new-building-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="new-description">Description</label>
          <textarea id="new-description" name="description" rows="2"></textarea>
          <p class="field-error" id="new-description-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="new-priority">Priority</label>
          <select id="new-priority" name="priority">
            <option value="">Select a priority</option>
            <option value="immediate">Immediate</option>
            <option value="short-term">Short-term</option>
            <option value="longer-term">Longer-term</option>
          </select>
          <p class="field-error" id="new-priority-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="new-owner">Owner</label>
          <input type="text" id="new-owner" name="owner" />
          <p class="field-error" id="new-owner-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="new-target-date">Target completion date</label>
          <input type="date" id="new-target-date" name="targetDate" />
          <p class="field-error" id="new-target-date-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="new-evidence-note">Evidence note (optional)</label>
          <textarea id="new-evidence-note" name="evidenceNote" rows="2"></textarea>
        </div>

        <button type="submit">Add action</button>
      </form>
    </section>

    <section class="filter-bar" aria-label="Filter actions">
      <div class="filter-field">
        <label for="status-filter">Status</label>
        <select id="status-filter">
          <option value="all">All statuses</option>
          <option value="open">Open</option>
          <option value="in-progress">In progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="priority-filter">Priority</label>
        <select id="priority-filter">
          <option value="all">All priorities</option>
          <option value="immediate">Immediate</option>
          <option value="short-term">Short-term</option>
          <option value="longer-term">Longer-term</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="building-filter">Building</label>
        <select id="building-filter">
          <option value="all">All buildings</option>
        </select>
      </div>

      <div class="filter-field filter-field-checkbox">
        <label for="overdue-filter">
          <input type="checkbox" id="overdue-filter" />
          Overdue only
        </label>
      </div>

      <button type="button" id="clear-list-button" hidden>
        Clear list (dev)
      </button>
    </section>

    <section aria-label="Action list">
      <table id="action-table">
        <thead>
          <tr>
            <th>Building</th>
            <th>Description</th>
            <th>Priority</th>
            <th>Owner</th>
            <th>Target date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="action-list-body"></tbody>
      </table>

      <div id="empty-state" hidden>
        <p id="empty-state-message">No actions match the selected filters.</p>
        <button type="button" id="load-sample-data-button" hidden>
          Load sample data (dev)
        </button>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
